<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHR Tech - 嵌入式开发板 & 模块商城</title>
    <style>
        body { margin:0; font-family: 'Microsoft YaHei', sans-serif; background:#0f0f0f; color:#eee; }
        header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:1rem; text-align:center; }
        .logo { font-size:2.2rem; font-weight:bold; color:#00d4ff; }
        .hero { text-align:center; padding:100px 20px; background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('https://picsum.photos/id/1015/1920/800'); background-size:cover; }
        .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; padding:40px 20px; max-width:1200px; margin:0 auto; }
        .card { background:#1e1e1e; border-radius:12px; overflow:hidden; transition:0.3s; }
        .card:hover { transform:scale(1.05); box-shadow:0 10px 30px rgba(0,212,255,0.3); }
        .btn { background:#00d4ff; color:#000; padding:12px 24px; border:none; border-radius:50px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SHR Tech 商城</div>
        <p>专业嵌入式开发板 · 模块 · 传感器 · 一站式采购</p>
    </header>

    <section class="hero">
        <h1 style="font-size:3rem;">高性能嵌入式硬件</h1>
        <p style="font-size:1.4rem;">STM32 · ESP32 · Raspberry Pi · LVGL 开发套件</p>
        <button class="btn" onclick="alert('欢迎咨询采购！')">立即选购</button>
    </section>

    <section class="products">
        <div class="card">
            <img src="https://picsum.photos/id/201/400/250" width="100%" alt="STM32">
            <div style="padding:15px;">
                <h3>STM32H750 开发板</h3>
                <p>¥189</p>
                <button class="btn">加入购物车</button>
            </div>
        </div>
        <!-- 可以继续添加更多商品卡片 -->
    </section>

    <footer style="text-align:center; padding:40px; background:#111;">
        <p>联系方式：你的微信 / 邮箱 / 电话</p>
        <p>© 2026 SHR Tech - 嵌入式硬件解决方案提供商</p>
    </footer>
</body>
</html>
